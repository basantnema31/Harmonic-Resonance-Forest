name: GSSoC Auto Labeler

on:
  workflow_dispatch:
    inputs:
      sync_existing:
        description: "Label all existing issues and pull requests"
        required: false
        type: boolean
        default: true
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: gssoc-labeler-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || 'manual' }}
  cancel-in-progress: false

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Create and sync GSSoC labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const LABELS = {
              'gssoc:approved': {
                color: '2da44e',
                description: 'GSSoC approved contribution'
              },
              'quality:clean': {
                color: 'd4f0ff',
                description: 'Clean and well-structured contribution'
              },
              'quality:exceptional': {
                color: 'a2facf',
                description: 'Exceptional implementation quality'
              },
              'level:beginner': {
                color: '9be9a8',
                description: 'Beginner-friendly contribution'
              },
              'level:intermediate': {
                color: 'fbca04',
                description: 'Intermediate contribution'
              },
              'level:advanced': {
                color: 'fd8c73',
                description: 'Advanced contribution'
              },
              'level:critical': {
                color: '8250df',
                description: 'Critical or very complex contribution'
              },
              'type:docs': {
                color: 'd4c5f9',
                description: 'Documentation-related work'
              },
              'type:bug': {
                color: 'ffccd5',
                description: 'Bug fix'
              },
              'type:feature': {
                color: 'd4bfff',
                description: 'Feature or enhancement'
              },
              'type:testing': {
                color: 'b6e3ff',
                description: 'Testing-related work'
              },
              'type:design': {
                color: 'ffb3c7',
                description: 'Design or UI/UX work'
              },
              'type:refactor': {
                color: 'b7eb8f',
                description: 'Refactor or cleanup work'
              },
              'type:accessibility': {
                color: 'b6e3ff',
                description: 'Accessibility improvements'
              },
              'type:performance': {
                color: 'ffd6a5',
                description: 'Performance improvements'
              },
              'type:devops': {
                color: 'ffd6a5',
                description: 'CI, deployment, or infrastructure'
              },
              'type:security': {
                color: 'ffadad',
                description: 'Security-related work'
              }
            };

            const MANAGED = Object.keys(LABELS);

            async function ensureLabel(name) {
              const meta = LABELS[name];
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: meta.color,
                  description: meta.description
                });
              }
            }

            async function ensureAllLabels() {
              for (const name of MANAGED) {
                await ensureLabel(name);
              }
            }

            async function currentLabels(issueNumber) {
              const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });
              return labels.map(l => l.name);
            }

            async function applyLabels(issueNumber, desiredLabels) {
              const desired = [...new Set(desiredLabels.filter(Boolean))];
              const existing = new Set(await currentLabels(issueNumber));
              const toAdd = desired.filter(label => !existing.has(label));

              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: toAdd
                });
              }
            }

            function textBlob() {
              const parts = [];
              const issue = context.payload.issue;
              const pr = context.payload.pull_request;

              if (issue?.title) parts.push(issue.title);
              if (issue?.body) parts.push(issue.body);
              if (pr?.title) parts.push(pr.title);
              if (pr?.body) parts.push(pr.body);

              return parts.join('\n').toLowerCase();
            }

            function classifyIssueByText(blob) {
              const labels = new Set();

              if (/\b(bug|error|crash|fail|broken|fix|issue)\b/.test(blob)) labels.add('type:bug');
              if (/\b(feature|enhancement|request|add|implement|new)\b/.test(blob)) labels.add('type:feature');
              if (/\b(doc|docs|documentation|readme|guide|tutorial)\b/.test(blob)) labels.add('type:docs');
              if (/\b(test|testing|qa|unit test|integration test)\b/.test(blob)) labels.add('type:testing');
              if (/\b(design|ui|ux|layout|mockup|style)\b/.test(blob)) labels.add('type:design');
              if (/\b(refactor|cleanup|restructure|simplify|rewrite|rename)\b/.test(blob)) labels.add('type:refactor');
              if (/\b(accessibility|a11y|aria|wcag)\b/.test(blob)) labels.add('type:accessibility');
              if (/\b(performance|slow|optimi[sz]e|lag|benchmark|cache)\b/.test(blob)) labels.add('type:performance');
              if (/\b(devops|ci|cd|deploy|deployment|pipeline|docker|kubernetes|terraform)\b/.test(blob)) labels.add('type:devops');
              if (/\b(security|auth|oauth|jwt|secret|encrypt|vulnerability)\b/.test(blob)) labels.add('type:security');

              return labels;
            }

            function classifyFiles(files, blob) {
              const labels = new Set();
              const names = files.map(f => f.filename.toLowerCase());

              const docsHint = names.some(name =>
                name.startsWith('docs/') ||
                name.includes('/docs/') ||
                /(^|\/)(readme|changelog|contributing|code_of_conduct|license)(\.[^/]+)?$/.test(name) ||
                /\.(md|mdx|rst|txt|adoc)$/.test(name)
              );
              if (docsHint || /\bdocs?\b/.test(blob) || /\bdocumentation\b/.test(blob)) labels.add('type:docs');

              const testingHint = names.some(name =>
                name.includes('/test/') ||
                name.includes('/tests/') ||
                name.includes('/__tests__/') ||
                /(^|\/)(test|tests)\//.test(name) ||
                /\.(test|spec)\.[^.]+$/.test(name)
              );
              if (testingHint || /\btest(s|ing)?\b/.test(blob) || /\bqa\b/.test(blob)) labels.add('type:testing');

              const designHint = names.some(name =>
                name.includes('/design/') ||
                name.includes('/ui/') ||
                name.includes('/ux/') ||
                name.includes('/assets/') ||
                /\.(fig|svg|png|jpe?g|gif|webp|ico)$/.test(name) ||
                /\.(css|scss|sass|less)$/.test(name)
              );
              if (designHint || /\bdesign\b/.test(blob) || /\bui\b/.test(blob) || /\bux\b/.test(blob)) labels.add('type:design');

              const accessibilityHint = names.some(name =>
                name.includes('accessibility') ||
                name.includes('/a11y/') ||
                /aria|wcag/.test(name)
              );
              if (accessibilityHint || /\baccessibility\b/.test(blob) || /\ba11y\b/.test(blob) || /\baria\b/.test(blob) || /\bwcag\b/.test(blob)) labels.add('type:accessibility');

              const performanceHint = names.some(name =>
                name.includes('perf') ||
                name.includes('performance') ||
                name.includes('benchmark') ||
                name.includes('cache')
              );
              if (performanceHint || /\bperformance\b/.test(blob) || /\boptimi[sz]e\b/.test(blob) || /\bbenchmark\b/.test(blob)) labels.add('type:performance');

              const devopsHint = names.some(name =>
                name.startsWith('.github/workflows/') ||
                name.includes('/.github/workflows/') ||
                name.includes('/docker') ||
                name.includes('dockerfile') ||
                name.includes('compose.yml') ||
                name.includes('compose.yaml') ||
                name.includes('terraform') ||
                name.includes('k8s') ||
                name.includes('kubernetes') ||
                name.includes('helm') ||
                name.includes('/ci/')
              );
              if (devopsHint || /\b(devops|ci|cd|deploy|deployment|pipeline|docker|kubernetes|terraform)\b/.test(blob)) labels.add('type:devops');

              const securityHint = names.some(name =>
                name.includes('security') ||
                name.includes('/auth/') ||
                name.includes('oauth') ||
                name.includes('jwt') ||
                name.includes('secret') ||
                name.includes('encrypt')
              );
              if (securityHint || /\bsecurity\b/.test(blob) || /\bauth\b/.test(blob) || /\boauth\b/.test(blob) || /\bjwt\b/.test(blob) || /\bencrypt/.test(blob)) labels.add('type:security');

              const bugHint = /\b(bug|fix|hotfix|patch|resolve|resolved|issue)\b/.test(blob);
              if (bugHint) labels.add('type:bug');

              const featureHint = /\b(feature|enhancement|implement|add|added|introduce|new)\b/.test(blob);
              if (featureHint) labels.add('type:feature');

              const refactorHint = /\b(refactor|cleanup|restructure|simplify|rewrite|rename)\b/.test(blob);
              if (refactorHint) labels.add('type:refactor');

              return labels;
            }

            function classifyLevel(fileCount, additions, deletions) {
              const total = (additions || 0) + (deletions || 0);

              if (fileCount <= 3 && total <= 50) return 'level:beginner';
              if (fileCount <= 8 && total <= 250) return 'level:intermediate';
              if (fileCount <= 15 && total <= 700) return 'level:advanced';
              return 'level:critical';
            }

            async function getPrMeta(prNumber) {
              const [pr, files, reviews] = await Promise.all([
                github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                }),
                github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: prNumber,
                  per_page: 100
                }),
                github.paginate(github.rest.pulls.listReviews, {
                  owner,
                  repo,
                  pull_number: prNumber,
                  per_page: 100
                })
              ]);

              return { pr: pr.data, files, reviews };
            }

            async function labelIssueOrPr(item) {
              const issueNumber = item.number;
              const blob = `${item.title || ''}\n${item.body || ''}`.toLowerCase();

              const labels = new Set(['gssoc:approved', 'quality:clean']);

              if (item.pull_request) {
                const prNumber = item.number;
                const { pr, files } = await getPrMeta(prNumber);
                classifyFiles(files, blob).forEach(label => labels.add(label));
                labels.add(classifyLevel(files.length, pr.additions || 0, pr.deletions || 0));
              } else {
                classifyIssueByText(blob).forEach(label => labels.add(label));
              }

              await applyLabels(issueNumber, [...labels]);
            }

            async function syncCurrentEvent() {
              const payloadIssue = context.payload.issue;
              const payloadPr = context.payload.pull_request;
              const item = payloadIssue || payloadPr;
              if (!item) return;

              await labelIssueOrPr(item);
            }

            async function syncExistingItems() {
              const items = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'all',
                per_page: 100,
                sort: 'created',
                direction: 'asc'
              });

              for (const item of items) {
                await labelIssueOrPr(item);
              }
            }

            await ensureAllLabels();

            if (context.eventName === 'workflow_dispatch') {
              await syncExistingItems();
            } else {
              await syncCurrentEvent();
            }
